<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Publicidad</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; /* Espacio para móviles */
            box-sizing: border-box;
        }
        
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box; /* Asegura que el padding no desborde */
        }

        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 30px; 
            font-size: 1.8rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espacio uniforme entre inputs */
        }

        input { 
            width: 100%; 
            padding: 14px; /* Mayor área táctil */
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.3s, transform 0.1s;
        }

        button:hover { background: #0056b3; }
        button:active { transform: scale(0.98); }

        .error { 
            color: #dc3545; 
            background: #ffe6e6; 
            border: 1px solid #ffcccc; 
            padding: 10px; 
            border-radius: 6px; 
            text-align: center; 
            margin-bottom: 20px; 
            display: none; 
            font-size: 0.9rem;
        }

        /* Media Query para móviles pequeños */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                box-shadow: none; /* Más limpio en móvil */
                background: transparent; /* Integrado al fondo */
            }
            body { background: white; } /* Fondo blanco en móvil para parecer app nativa */
            
            h1 { font-size: 1.5rem; margin-bottom: 25px; }
            
            input, button { padding: 16px; } /* Aún más fácil de tocar */
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 Admin Access</h1>
        <div id="errorMsg" class="error"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario" required autocomplete="username">
            <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', data.username);
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
